services:
  mongodb:
    image: mongo:7.0
    container_name: express-auth-mongodb-dev
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: auth_db
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - auth-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: express-auth-app-dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.development
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - auth-network
    volumes:
      - ./:/app
      - /app/node_modules

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local

networks:
  auth-network:
    driver: bridge
